<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Settings</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="screen">
    <section class="topbar">
      <a href="/index.html" class="small-link">← Menu</a>
    </section>
    <section class="card settings-card">
      <h1>Settings</h1>
      <p class="muted">Paste your Google Apps Script Web App URL here when ready. Leave blank for demo mode.</p>
      <label for="endpoint">Google Apps Script Web App URL</label>
      <textarea id="endpoint" rows="5" placeholder="https://script.google.com/macros/s/.../exec"></textarea>
      <button id="saveSettings" class="menu-button">Save settings</button>
      <button id="clearSettings" class="danger-small">Return to demo mode</button>
      <div id="message" class="message"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
